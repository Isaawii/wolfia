name: wolfia
description: Asistente personal de estudio de piano (basado en Piano Studio SDD)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  uuid: ^4.4.2
  intl: ^0.19.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#181233"
    theme_color: "#181233"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
  # Si generaste icon_foreground.png (monograma sin fondo), descomentá
  # estas dos líneas para un ícono adaptativo prolijo en Android:
  # adaptive_icon_background: "#181233"
  # adaptive_icon_foreground: "assets/icon/icon_foreground.png"